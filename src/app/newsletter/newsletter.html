<div class="content">
    <p>Inscrivez-vous à la newsletter pour être notifié des nouveaux articles.</p>
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" [formGroup]="newsletterForm" (ngSubmit)="onSubmit()">
        <!-- Honeypot anti-bot : ce champ doit rester vide -->
        <div class="honeypot">
            <label for="bot-field">Ne pas remplir ce champ</label>
            <input type="text" id="bot-field" formControlName="botField" autocomplete="off">
        </div>
        <div class="ligne">
            <div class="inputZone">
                <label for="email">Email</label>
                <input type="email" id="email" formControlName="email" required>
            </div>
            <div class="submit">
                <button
                    type="submit"
                    class="submit-button"
                    [disabled]="newsletterForm.invalid || envoiEnCours"
                    [attr.aria-label]="envoiEnCours ? 'Envoi en cours' : 'Envoyer'"
                    [attr.title]="envoiEnCours ? 'Envoi en cours' : 'Envoyer'">

                    @if (!envoiEnCours) {
                        <svg class="icon-send" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="m3 3 3 9-3 9 19-9Z"/>
                            <path d="M6 12h16"/>
                        </svg>
                    } @else {
                        <span class="spinner" aria-hidden="true"></span>
                    }

                    <span class="sr-only">
                        {{ envoiEnCours ? 'Envoi en cours' : 'Envoyer' }}
                    </span>
                </button>
            </div>
        </div>
    </form>

    @if (envoiReussi) {
        <p class="feedback success">Votre inscription à la newsletter a été prise en compte.</p>
    }
    @if (envoiEchoue) {
        <p class="feedback error">Une erreur est survenue. Veuillez réessayer plus tard.</p>
    }
</div>
