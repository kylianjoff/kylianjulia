<div class="content">
    <p>Vous pouvez demander à entrer en contact avec moi via ce formulaire.</p>
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" [formGroup]="contactForm" (ngSubmit)="onSubmit()">
        <!-- Honeypot anti-bot : ce champ doit rester vide -->
        <div class="honeypot">
            <label for="bot-field">Ne pas remplir ce champ</label>
            <input type="text" id="bot-field" formControlName="botField" autocomplete="off">
        </div>
        <div class="name">
            <div class="inputZone">
                <label for="firstName" [class.required]="isRequired('firstName')">Prénom</label>
                <input type="text" id="firstName" formControlName="firstName">
            </div>
            <div class="inputZone">
                <label for="lastName" [class.required]="isRequired('lastName')">Nom</label>
                <input type="text" id="lastName" formControlName="lastName">
            </div>
        </div>
        <div class="inputZone">
            <label for="email" [class.required]="isRequired('email')">Email</label>
            <input type="email" id="email" formControlName="email">
        </div>
        <div class="inputZone">
            <label for="subject" [class.required]="isRequired('subject')">Sujet</label>
            <input type="text" id="subject" formControlName="subject">
        </div>
        <div class="inputZone">
            <label for="message" [class.required]="isRequired('message')">Message</label>
            <textarea id="message" formControlName="message"></textarea>
        </div>
        <div class="submit">
            <button type="submit" [disabled]="contactForm.invalid || envoiEnCours">
                {{ envoiEnCours ? 'Envoi en cours...' : 'Envoyer' }}
            </button>
        </div>
    </form>
    @if (envoiReussi) {
        <p class="feedback success">Merci ! Votre message a bien été envoyé. Je reviens vers vous rapidement.</p>
    }
    @if (envoiEchoue) {
        <p class="feedback error">Une erreur est survenue. Veuillez réessayer plus tard.</p>
    }
    <p class="obligatoire">Obligatoire</p>
</div>
